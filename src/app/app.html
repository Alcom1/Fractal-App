<main class="main">
  <div class="content">
    <div class="side-container">
      <div>
        <div class="slider-data slider-data-vert">{{appModel.centerY.toFixed(2)}}</div>
        <div class="slider-data slider-data-vert slider-label-vert">y-center</div>
      </div>
      <input type="range" id="slider-yaxis" min="-1" max="1" step="any" [(ngModel)]="appModel.centerY" (ngModelChange)="sliderChanged()"/>
    </div>
    <canvas id="canvas" width="800" height="800"></canvas>
    <div class="side-container"></div>
  </div>
  <div class="content">
    <div class="slider-data slider-data-horz">x-center</div>
    <input type="range" id="slider-xaxis" min="-1" max="1" step="any" [(ngModel)]="appModel.centerX" (ngModelChange)="sliderChanged()"/>
    <div class="slider-data slider-data-horz slider-number-horz">{{appModel.centerX.toFixed(2)}}</div>
  </div>
  <div class="content">
    <div class="slider-data slider-data-horz">zoom</div>
    <input type="range" id="slider-xaxis" min="1" max="50" step="any" [(ngModel)]="appModel.zoom" (ngModelChange)="sliderChanged()"/>
    <div class="slider-data slider-data-horz slider-number-horz">{{appModel.zoom.toFixed(2)}}</div>
  </div>
</main>
